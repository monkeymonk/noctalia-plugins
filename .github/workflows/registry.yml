name: registry

on:
  push:
    branches: [master, main]
    paths:
      - '*/manifest.json'
      - 'scripts/build-registry.py'
      - '.github/workflows/registry.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate registry.json
        run: python3 scripts/build-registry.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain registry.json)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add registry.json
            git commit -m 'chore: regenerate registry.json'
            git push
          else
            echo 'registry.json already up to date'
          fi
